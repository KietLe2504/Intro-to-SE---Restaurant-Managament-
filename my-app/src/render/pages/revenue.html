<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doanh thu — RestaurantOS</title>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/layout.css"/>
  <link rel="stylesheet" href="../styles/components.css"/>
  <link rel="stylesheet" href="../styles/screens.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-area">
    <header class="top-header" id="top-header"></header>
    <div class="page-content">

      <div class="revenue-summary" id="rev-summary"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <!-- Top items -->
        <div class="card">
          <div class="card-title">Món bán chạy nhất</div>
          <div id="top-items"></div>
        </div>

        <!-- Staff performance -->
        <div class="card">
          <div class="card-title">Hiệu suất nhân viên</div>
          <div id="staff-perf"></div>
        </div>
      </div>

      <div style="margin-top:16px" class="card">
        <div class="card-title">Tất cả đơn đã thanh toán</div>
        <table class="data-table" id="paid-table">
          <thead>
            <tr><th>Mã đơn</th><th>Bàn</th><th>Nhân viên</th><th>Tổng tiền</th><th>Thời gian</th></tr>
          </thead>
          <tbody id="paid-tbody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>
<script type="module">
  import { requireManager }              from '../js/auth.js';
  import { renderSidebar, renderHeader } from '../js/ui.js';
  import { orders, tables, users, menuItems, calcOrderTotal } from '../js/data.js';

  const session = requireManager();
  if (!session) throw new Error();
  renderSidebar('revenue');
  renderHeader({ title: 'Thống kê doanh thu', sub: 'Dành cho quản lý', showBack: true, backUrl: 'dashboard.html' });

  const paid      = orders.filter(o => o.status === 'paid');
  const cancelled = orders.filter(o => o.status === 'cancelled');
  const totalRev  = paid.reduce((s, o) => s + calcOrderTotal(o), 0);
  const avgOrder  = paid.length ? Math.round(totalRev / paid.length) : 0;

  // Summary cards
  document.getElementById('rev-summary').innerHTML = [
    { label: 'Tổng doanh thu', value: totalRev.toLocaleString('vi') + 'đ', accent: true },
    { label: 'Đơn đã thanh toán', value: paid.length, accent: false },
    { label: 'Giá trị đơn TB', value: avgOrder.toLocaleString('vi') + 'đ', accent: false },
    { label: 'Đơn bị hủy', value: cancelled.length, accent: false },
    { label: 'Tổng đơn', value: orders.length, accent: false },
    { label: 'Tỉ lệ thanh toán', value: orders.length ? Math.round(paid.length / orders.length * 100) + '%' : '0%', accent: true },
  ].map(s => `
    <div class="stat-card ${s.accent ? 'stat-card-accent' : 'stat-card-gold'}">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value" style="font-size:22px">${s.value}</div>
    </div>
  `).join('');

  // Top items
  const itemCount = {};
  paid.forEach(o => o.items.forEach(i => {
    itemCount[i.name] = (itemCount[i.name] || 0) + i.qty;
  }));
  const sorted = Object.entries(itemCount).sort((a,b) => b[1]-a[1]).slice(0,8);
  const maxQty = sorted[0]?.[1] || 1;
  document.getElementById('top-items').innerHTML = sorted.map(([name, qty], i) => `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-size:12px;color:var(--muted);min-width:16px">${i+1}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500;margin-bottom:3px">${name}</div>
        <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${Math.round(qty/maxQty*100)}%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:3px"></div>
        </div>
      </div>
      <span style="font-size:13px;font-weight:600;color:var(--red);min-width:30px">${qty}</span>
    </div>
  `).join('') || '<div style="color:var(--muted);text-align:center;padding:20px">Chưa có dữ liệu</div>';

  // Staff performance
  const staffStats = users.map(u => ({
    name: u.name, role: u.role,
    total: orders.filter(o => o.staffId === u.id).length,
    revenue: orders.filter(o => o.staffId === u.id && o.status === 'paid').reduce((s,o) => s + calcOrderTotal(o), 0),
  })).sort((a,b) => b.revenue - a.revenue);

  document.getElementById('staff-perf').innerHTML = staffStats.map(s => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500">${s.name}</div>
        <div style="font-size:11px;color:var(--muted)">${s.total} đơn</div>
      </div>
      <div style="font-family:var(--font-display);font-weight:700;color:var(--red);font-size:14px">${s.revenue.toLocaleString('vi')}đ</div>
    </div>
  `).join('');

  // Paid orders table
  document.getElementById('paid-tbody').innerHTML = paid.map(o => {
    const table = tables.find(t => t.id === o.tableId);
    const time  = new Date(o.createdAt).toLocaleString('vi');
    return `
      <tr>
        <td style="font-family:var(--font-display);color:var(--red);font-weight:700">${o.id.replace('ord-','#')}</td>
        <td>Bàn ${table?.num || '?'}</td>
        <td style="color:var(--muted)">${o.staffName}</td>
        <td style="font-weight:600">${calcOrderTotal(o).toLocaleString('vi')}đ</td>
        <td style="color:var(--muted);font-size:12px">${time}</td>
      </tr>
    `;
  }).join('') || '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--muted)">Chưa có đơn thanh toán</td></tr>';
</script>
</body>
</html>
